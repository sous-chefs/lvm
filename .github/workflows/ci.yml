---
name: "Lint & Unit Test"

"on":
  pull_request:
  push:
    branches: [main]

jobs:
  lint-unit:
    uses: sous-chefs/.github/.github/workflows/lint-unit.yml@main
    permissions:
      actions: write
      checks: write
      pull-requests: write
      statuses: write
      issues: write

  integration:
    needs: lint-unit
    # Temporary pin: keep this on 22.04 until we migrate off Vagrant/VirtualBox.
    # Follow-up required before ubuntu-22.04 runner EOL.
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            suite: default
          - os: ubuntu-22.04
            suite: create
          - os: ubuntu-22.04
            suite: remove
          - os: ubuntu-22.04
            suite: create-thin
          - os: ubuntu-22.04
            suite: resize
          - os: ubuntu-22.04
            suite: resize-thin
          - os: ubuntu-22.04
            suite: resize-thin-pool-meta-data
      fail-fast: false

    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Install Chef
        uses: sous-chefs/.github/.github/actions/install-workstation@main
      - name: test-kitchen
        uses: actionshub/test-kitchen@3.0.0
        env:
          CHEF_LICENSE: accept-no-persist
          KITCHEN_LOCAL_YAML: kitchen.yml
        with:
          suite: ${{ matrix.suite }}
          os: ${{ matrix.os }}
