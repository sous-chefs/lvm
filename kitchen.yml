---
driver:
  name: vagrant

provisioner:
  name: chef_infra
  product_name: chef
  channel: current
  chef_license: accept-no-persist
  deprecations_as_errors: true
  always_update_cookbooks: true

verifier:
  name: inspec

platforms:
  - name: rockylinux-8
    driver:
      box: bento/rockylinux-8
      customize:
        storagectl: "SATA Controller"
        storages:
          - port: 1
            medium: disk
            size: 4096

  - name: rockylinux-9
    driver:
      box: bento/rockylinux-9
      customize:
        storagectl: "SATA Controller"
        storages:
          - port: 1
            medium: disk
            size: 4096

  - name: rockylinux-10
    driver:
      box: bento/rockylinux-10
      customize:
        storagectl: "SATA Controller"
        storages:
          - port: 1
            medium: disk
            size: 4096

  - name: ubuntu-2204
    driver:
      box: bento/ubuntu-22.04
      customize:
        storagectl: "SATA Controller"
        storages:
          - port: 1
            medium: disk
            size: 4096

  - name: ubuntu-2604
    driver:
      box: bento/ubuntu-26.04
      customize:
        storagectl: "SATA Controller"
        storages:
          - port: 1
            medium: disk
            size: 4096

suites:
  - name: default
    provisioner:
      named_run_list: default
    verifier:
      inspec_tests:
        - test/integration/default
    includes:
      - rockylinux-8
      - rockylinux-9
      - rockylinux-10
      - ubuntu-2204
      - ubuntu-2604
  - name: filesystem
    provisioner:
      named_run_list: filesystem
    verifier:
      inspec_tests:
        - test/integration/filesystem
    includes:
      - ubuntu-2204
      - ubuntu-2604
  - name: xfs
    provisioner:
      named_run_list: xfs
    verifier:
      inspec_tests:
        - test/integration/xfs
    includes:
      - rockylinux-8
      - rockylinux-9
      - rockylinux-10
  - name: thin
    provisioner:
      named_run_list: thin
    verifier:
      inspec_tests:
        - test/integration/thin
    includes:
      - rockylinux-9
      - rockylinux-10
      - ubuntu-2204
      - ubuntu-2604
  - name: btrfs
    provisioner:
      named_run_list: btrfs
    verifier:
      inspec_tests:
        - test/integration/btrfs
    includes:
      - ubuntu-2204
      - ubuntu-2604
