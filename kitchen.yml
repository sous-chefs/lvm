driver:
  name: vagrant

provisioner:
  name: chef_infra
  deprecations_as_errors: true
  product_name: <%= ENV['CHEF_PRODUCT_NAME'] || 'chef' %>
  chef_license: accept-no-persist
  product_version: <%= ENV['CHEF_VERSION'] || 'latest' %>
  log_level: <%= ENV['CHEF_LOG_LEVEL'] || 'auto' %>

verifier:
  name: inspec

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: almalinux-10
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: centos-stream-10
  - name: debian-12
  - name: debian-13
  - name: fedora-latest
  - name: opensuse-leap-15
  - name: oraclelinux-8
  - name: oraclelinux-9
  - name: rockylinux-8
  - name: rockylinux-9
  - name: rockylinux-10
  - name: ubuntu-22.04
  - name: ubuntu-24.04
  - name: ubuntu-26.04

suites:
  - name: default
  - name: create
    named_run_list: create
  - name: remove
    named_run_list: remove
  - name: create-thin
    named_run_list: create_thin
  - name: resize
    named_run_list: resize
  - name: resize-thin
    named_run_list: resize_thin
  - name: resize-thin-pool-meta-data
    named_run_list: resize_thin_pool_meta_data
